# GiveBlack – Apache proxy for giveblackapp.com (if you use Apache instead of Nginx)
# Enable mod_proxy and mod_proxy_http: sudo a2enmod proxy proxy_http
# Then: sudo a2ensite giveblackapp.com (or put this in a conf that's included)

<VirtualHost *:80>
    ServerName giveblackapp.com
    ServerAlias www.giveblackapp.com

    # Proxy /app/* to Node API (port 5001)
    ProxyPreserveHost On
    ProxyPass /app/ http://127.0.0.1:5001/
    ProxyPassReverse /app/ http://127.0.0.1:5001/

    # Optional: serve landing and admin from local paths
    # DocumentRoot /var/www/Giveblack-website/out
    # Alias /admin /var/www/giveblack/apps/admin/dist
</VirtualHost>

# If using SSL (adjust paths to your certs):
# <VirtualHost *:443>
#     ServerName giveblackapp.com
#     SSLEngine on
#     SSLCertificateFile /path/to/fullchain.pem
#     SSLCertificateKeyFile /path/to/privkey.pem
#     ProxyPreserveHost On
#     ProxyPass /app/ http://127.0.0.1:5001/
#     ProxyPassReverse /app/ http://127.0.0.1:5001/
# </VirtualHost>
