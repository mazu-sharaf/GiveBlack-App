# GiveBlack – giveblackapp.com (HTTP only; run certbot later for HTTPS)
# Paths: landing = Giveblack-website/out, admin = giveblack/apps/admin/dist, API = Node :5001

server {
    listen 80;
    server_name giveblackapp.com www.giveblackapp.com;

    # Landing (Next.js static export)
    root /var/www/Giveblack-website/out;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin SPA
    location /admin/ {
        alias /var/www/giveblack/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    # App + API (Express)
    location /app/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
