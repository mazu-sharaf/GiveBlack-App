# GiveBlack – giveblack.mawa.pro (temporary staging domain)
# Copy to: /etc/nginx/sites-available/giveblack.mawa.pro
# Then: sudo ln -sf /etc/nginx/sites-available/giveblack.mawa.pro /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Prereqs: SSL via certbot (sudo certbot --nginx -d giveblack.mawa.pro)

server {
    listen 80;
    server_name giveblack.mawa.pro;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name giveblack.mawa.pro;

    ssl_certificate     /etc/letsencrypt/live/giveblack.mawa.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giveblack.mawa.pro/privkey.pem;

    # Admin SPA: always proxy to the API (same as localhost:5001/admin/).
    # Do NOT serve /admin from the marketing root: /admin (no slash) would hit `location /`,
    # serve Next's index.html, and the client router redirects unknown paths to `/`.
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App-prefixed API reverse proxy (/app/* -> Node.js on port 5001)
    # Supports clients configured with EXPO_PUBLIC_API_URL=https://giveblack.mawa.pro/app
    location /app/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API reverse proxy (/api/* -> Node.js on port 5001)
    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Uploads (if served by API at /uploads/*)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Landing site (Next build output)
    location / {
        root /var/www/Giveblack-website/out;
        try_files $uri $uri/ /index.html;
    }
}
