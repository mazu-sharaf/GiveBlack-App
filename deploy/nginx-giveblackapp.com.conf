# GiveBlack – giveblackapp.com (production)
# Copy to: /etc/nginx/sites-available/giveblackapp.com
# Then: sudo ln -sf /etc/nginx/sites-available/giveblackapp.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# SSL (apex + admin): the cert at live/giveblackapp.com must include SAN admin.giveblackapp.com
# (otherwise browsers show NET::ERR_CERT_COMMON_NAME_INVALID; HSTS includeSubDomains prevents bypass).
#   sudo certbot --nginx -d giveblackapp.com -d www.giveblackapp.com -d admin.giveblackapp.com
# Or from repo: CERTBOT_EMAIL=you@example.com bash deploy/ssl-expand-giveblackapp-admin.sh
# (After certificates exist, use the 443 block below; certbot may merge HTTP→HTTPS redirect.)
#
# Routes (apex: landing / → Next.js, API /app/, admin /admin/; admin host: https://admin.giveblackapp.com/ → upstream /admin/):
#   /support       → Fastify HTML (port 5001) — must stay before location /
#   /              → Next.js marketing site (PM2: giveblack-landing, port 5000)
#   /c/            → Fastify (Stripe thank-you + short links); must be before /
#   /admin         → Fastify serves admin SPA (port 5001)
#   /app/<path>    → API as https://giveblackapp.com/app/...  (EXPO_PUBLIC_API_URL=https://giveblackapp.com/app)
#   /api/<path>    → API as https://giveblackapp.com/api/...  (alternate; same upstream)
#   /uploads/      → static uploads from API
#
# Stripe webhook (canonical with /app prefix): POST https://giveblackapp.com/app/api/webhooks/stripe

server {
    listen 80;
    server_name giveblackapp.com www.giveblackapp.com admin.giveblackapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name giveblackapp.com www.giveblackapp.com;

    ssl_certificate     /etc/letsencrypt/live/giveblackapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giveblackapp.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Admin SPA: proxy to API (same as localhost:5001/admin/).
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App-prefixed API (/app/* -> strips /app when proxying to Node root)
    location /app/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Bare /api/* (optional; mobile can use EXPO_PUBLIC_API_URL=https://giveblackapp.com/app instead)
    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Fastify campaign routes (/c/:id/thank-you, /c/:id → admin) — not served by Next
    location ^~ /c/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Public support page (Fastify HTML; must be before Next.js catch-all /)
    location ^~ /support {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Next.js landing (giveblack-landing)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Admin on dedicated host: browser stays on admin.giveblackapp.com while upstream still serves the SPA at /admin/.
server {
    listen 443 ssl http2;
    server_name admin.giveblackapp.com;

    ssl_certificate     /etc/letsencrypt/live/giveblackapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giveblackapp.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:5001/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
