<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Give Black — Not found</title>
    <style>
      :root {
        --bg: #f7f5ef;
        --text: #0b0b0b;
        --muted: rgba(0, 0, 0, 0.6);
        --link: #0f6a2f;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .wrap {
        text-align: center;
        max-width: 520px;
        padding: 10px 12px;
      }
      .logo {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        margin: 0 auto 14px;
        overflow: hidden;
        border: 1px solid rgba(0,0,0,0.08);
        background: rgba(0,0,0,0.02);
        display: grid;
        place-items: center;
      }
      .logo img { width: 40px; height: 40px; object-fit: cover; }
      .n {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 0.02em;
        margin: 0;
      }
      .t {
        margin: 6px 0 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--muted);
        font-size: 14px;
      }
      a {
        display: inline-block;
        margin-top: 14px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        font-size: 14px;
        color: var(--link);
        text-decoration: none;
        border-bottom: 1px solid rgba(15, 106, 47, 0.35);
        padding-bottom: 2px;
      }
      a:hover { filter: brightness(0.9); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">
        <img src="/backoffice/giveblack-icon.png" alt="Give Black" />
      </div>
      <h1 class="n">404</h1>
      <p class="t">Oops! Page not found</p>
      <a href="/">Return to Home</a>
    </div>
  </body>
</html>
