<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiveBlack Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#090B10;color:#FFF;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0}
.bg .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.12}
.bg .orb1{width:600px;height:600px;background:#2D9E6B;top:-20%;left:-10%}
.bg .orb2{width:400px;height:400px;background:#D4AF37;bottom:-10%;right:-5%}
.bg .orb3{width:300px;height:300px;background:#3B82F6;top:50%;left:50%;transform:translate(-50%,-50%)}
.bg .grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}
.logo{text-align:center;margin-bottom:44px}
.logo-mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#2D9E6B,#1a7d50);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 32px rgba(45,158,107,.25)}
.logo-mark svg{width:28px;height:28px}
.logo h1{font-size:28px;font-weight:800;letter-spacing:-.8px;line-height:1}
.logo h1 span{background:linear-gradient(135deg,#2D9E6B,#5FCFA0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:#4B5563;font-size:12px;margin-top:8px;font-weight:500;text-transform:uppercase;letter-spacing:3px}
.card{background:rgba(17,20,28,.8);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:36px;backdrop-filter:blur(20px)}
.card h2{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.card .sub{color:#6B7280;font-size:13px;margin-bottom:28px}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;color:#9CA3AF;margin-bottom:8px}
.field .input-wrap{position:relative}
.field .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#4B5563;pointer-events:none}
.field input{width:100%;padding:14px 16px 14px 44px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#FFF;font-size:14px;font-family:'Inter',system-ui,sans-serif;outline:none;transition:all .25s}
.field input:focus{border-color:rgba(45,158,107,.5);background:rgba(45,158,107,.04);box-shadow:0 0 0 3px rgba(45,158,107,.08)}
.field input::placeholder{color:#374151}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#FCA5A5;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;align-items:center;gap:8px;font-weight:500}
.error-box svg{width:18px;height:18px;flex-shrink:0;color:#F87171}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#2D9E6B,#239B5E);color:#FFF;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Inter',system-ui,sans-serif;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;letter-spacing:-.2px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(45,158,107,.3)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#FFF;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
.btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;font-size:11px;color:#374151;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.secure{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;font-size:11px;color:#374151;font-weight:500}
.secure svg{width:14px;height:14px;color:#4B5563}
.footer{text-align:center;margin-top:28px;font-size:11px;color:#1F2937;letter-spacing:.3px}
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <div class="grid-lines"></div>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
    <h1>Give<span>Black</span></h1>
    <p>Administration</p>
  </div>
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to manage your platform</p>
    <div class="error-box" id="error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span id="error-msg"></span></div>
    <form id="form" autocomplete="on">
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
          <input type="email" id="email" placeholder="admin@gb.com" autocomplete="email" required autofocus>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn" id="btn"><span class="spinner"></span>Sign In</button>
    </form>
    <div class="secure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Encrypted & Secure</div>
  </div>
  <div class="footer">&copy; 2025 GiveBlack. All rights reserved.</div>
</div>
<script>
(function(){
  var token=localStorage.getItem('gb_admin_token');
  if(token){fetch('/api/admin/me',{headers:{Authorization:'Bearer '+token}}).then(function(r){if(r.ok)window.location.href='/admin'}).catch(function(){})}
  document.getElementById('form').addEventListener('submit',async function(e){
    e.preventDefault();
    var btn=document.getElementById('btn'),err=document.getElementById('error'),msg=document.getElementById('error-msg');
    err.style.display='none';btn.disabled=true;btn.classList.add('loading');
    try{
      var r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
      var d=await r.json();
      if(d.success&&d.token){localStorage.setItem('gb_admin_token',d.token);localStorage.setItem('gb_admin_name',d.admin&&d.admin.name||'Admin');window.location.href='/admin'}
      else{msg.textContent=d.error||'Invalid credentials';err.style.display='flex'}
    }catch(ex){msg.textContent='Connection error. Try again.';err.style.display='flex'}
    btn.disabled=false;btn.classList.remove('loading');
  });
})();
</script>
</body>
</html>
